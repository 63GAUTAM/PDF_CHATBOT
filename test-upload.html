<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #10a37f;
            --dark-bg: #0d0d0d;
            --darker-bg: #050505;
            --sidebar-bg: #0d0d0d;
            --message-bot-bg: #1a1a1a;
            --border-color: #2a2a2a;
            --text-primary: #ececec;
            --text-secondary: #8b8b8b;
            --hover-light: #171717;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .new-chat-btn {
            width: 100%;
            padding: 10px 12px;
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .new-chat-btn:hover {
            background: var(--hover-light);
            border-color: var(--text-secondary);
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .session-item {
            padding: 10px 12px;
            margin: 4px 0;
            background: transparent;
            border: 1px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .session-item:hover {
            background: var(--hover-light);
            border-color: var(--border-color);
        }

        .session-item.active {
            background: var(--hover-light);
            border-color: var(--primary);
            color: var(--primary);
        }

        /* ===== MAIN CONTAINER ===== */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--dark-bg);
        }

        /* ===== HEADER ===== */
        .chat-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-title {
            font-size: 15px;
            font-weight: 600;
        }

        .chat-controls {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 32px;
            height: 32px;
            border: 1px solid var(--border-color);
            background: transparent;
            border-radius: 6px;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            background: var(--hover-light);
            border-color: var(--text-secondary);
        }

        /* ===== CHAT AREA ===== */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            color: var(--text-secondary);
        }

        .chat-welcome h1 {
            font-size: 32px;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .chat-welcome p {
            font-size: 14px;
            margin-bottom: 20px;
        }

        .message {
            display: flex;
            gap: 10px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: var(--primary);
            color: white;
            order: 2;
        }

        .message.assistant .message-avatar {
            background: #f5f5f5;
            color: #333;
            font-weight: 600;
        }

        .message-bubble {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 14px;
            word-wrap: break-word;
        }

        .message.user .message-bubble {
            background: var(--primary);
            color: white;
            order: 1;
        }

        .message.assistant .message-bubble {
            background: var(--message-bot-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .message-time {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
            padding: 0 4px;
        }

        /* ===== INPUT SECTION ===== */
        .input-section {
            padding: 16px 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .upload-area {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .upload-btn {
            padding: 9px 12px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .upload-btn:hover {
            background: var(--hover-light);
            border-color: var(--text-secondary);
        }

        #fileInput {
            display: none;
        }

        .input-wrapper {
            display: flex;
            gap: 8px;
            background: var(--message-bot-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            transition: all 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: var(--primary);
        }

        .input-wrapper textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            resize: none;
            max-height: 100px;
            outline: none;
        }

        .input-wrapper textarea::placeholder {
            color: var(--text-secondary);
        }

        .send-btn {
            width: 32px;
            height: 32px;
            min-width: 32px;
            background: var(--primary);
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover:not(:disabled) {
            background: #0d9365;
        }

        .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .info-text {
            font-size: 11px;
            color: var(--text-secondary);
            text-align: center;
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }

            .message-bubble {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" onclick="newChat()">
                ✏️ New Testing
            </button>
        </div>
        <div class="sidebar-content" id="sessionList">
            <div style="padding: 16px; color: var(--text-secondary); font-size: 12px; text-align: center;">
                No sessions yet
            </div>
        </div>
    </div>

    <!-- MAIN CHAT -->
    <div class="main-container">
        <!-- HEADER -->
        <div class="chat-header">
            <div class="chat-title">📄 PDF Chatbot Tester</div>
            <div class="chat-controls">
                <button class="icon-btn" title="Clear chat" onclick="clearChat()">🗑️</button>
            </div>
        </div>

        <!-- CHAT AREA -->
        <div class="chat-area" id="chatArea">
            <div class="chat-welcome">
                <h1>PDF Chatbot Tester</h1>
                <p>Upload a PDF and start testing the API</p>
            </div>
        </div>

        <!-- INPUT SECTION -->
        <div class="input-section">
            <!-- File Upload -->
            <div class="upload-area">
                <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
                    📁 Upload PDF
                </button>
                <button class="upload-btn" onclick="showApiStatus()">
                    🔍 API Status
                </button>
            </div>

            <!-- Question Input -->
            <div class="input-wrapper">
                <textarea
                    id="questionInput"
                    placeholder="Ask something about your PDF..."
                    rows="1"
                    onkeydown="handleKeydown(event)"
                ></textarea>
                <button class="send-btn" onclick="sendQuestion()" title="Send">
                    ➤
                </button>
            </div>

            <div class="info-text">
                💡 Upload a PDF first, then ask questions about it
            </div>
        </div>
    </div>

    <!-- Hidden File Input -->
    <input type="file" id="fileInput" accept=".pdf" onchange="uploadPdf(event)">

    <script>
        const API_URL = 'http://localhost:5000/api';
        let currentPdfId = null;
        let currentSessionId = 'test_' + Date.now();
        let sessionHistory = [];

        // Check API Status
        async function showApiStatus() {
            try {
                const response = await fetch(`${API_URL}/health`);
                addMessage('assistant', response.ok ? '✅ API is online and responding!' : '❌ API not responding');
            } catch (error) {
                addMessage('assistant', `❌ API Error: ${error.message}`);
            }
        }

        // Upload PDF
        async function uploadPdf(event) {
            const file = event.target.files[0];
            if (!file) return;

            addMessage('assistant', `📂 Uploading ${file.name}...`);

            const formData = new FormData();
            formData.append('pdf', file);

            try {
                const response = await fetch(`${API_URL}/pdf/upload`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    currentPdfId = data.pdfId;
                    addMessage('assistant', `✅ PDF uploaded successfully!\n📎 PDF ID: ${data.pdfId}\n\nNow you can ask questions about this PDF!`);
                    addSessionToHistory(file.name);
                } else {
                    addMessage('assistant', `❌ Upload failed: ${data.error}`);
                }
            } catch (error) {
                addMessage('assistant', `❌ Error: ${error.message}`);
            }

            event.target.value = '';
        }

        // Send Question
        async function sendQuestion() {
            const question = document.getElementById('questionInput').value.trim();
            
            if (!question) return;
            if (!currentPdfId) {
                addMessage('assistant', '⚠️ Please upload a PDF first');
                return;
            }

            addMessage('user', question);
            document.getElementById('questionInput').value = '';
            document.getElementById('questionInput').style.height = 'auto';

            try {
                const response = await fetch(`${API_URL}/chat/ask`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        pdfIds: [currentPdfId],
                        sessionId: currentSessionId,
                        question: question
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    addMessage('assistant', data.data.answer);
                } else {
                    addMessage('assistant', `❌ Error: ${data.error}`);
                }
            } catch (error) {
                addMessage('assistant', `❌ Error: ${error.message}`);
            }
        }

        // Add Message
        function addMessage(role, content) {
            const chatArea = document.getElementById('chatArea');
            
            // Remove welcome message if exists
            const welcome = chatArea.querySelector('.chat-welcome');
            if (welcome) welcome.remove();

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const avatar = `<div class="message-avatar">${role === 'user' ? '👤' : '🤖'}</div>`;
            const time = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

            messageDiv.innerHTML = `
                ${avatar}
                <div>
                    <div class="message-bubble">${content.replace(/\n/g, '<br>')}</div>
                    <div class="message-time">${time}</div>
                </div>
            `;

            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // Clear Chat
        function clearChat() {
            document.getElementById('chatArea').innerHTML = `
                <div class="chat-welcome">
                    <h1>PDF Chatbot Tester</h1>
                    <p>Upload a PDF and start testing the API</p>
                </div>
            `;
            currentSessionId = 'test_' + Date.now();
        }

        // New Chat
        function newChat() {
            currentPdfId = null;
            currentSessionId = 'test_' + Date.now();
            clearChat();
            addMessage('assistant', '👋 Ready for a new test session! Upload a PDF to get started.');
        }

        // Add Session to History
        function addSessionToHistory(name) {
            const sessionList = document.getElementById('sessionList');
            sessionList.innerHTML = '';

            if (sessionHistory.length === 0) {
                sessionList.innerHTML = '<div style="padding: 16px; color: var(--text-secondary); font-size: 12px; text-align: center;">Current session</div>';
            }

            const sessionDiv = document.createElement('div');
            sessionDiv.className = 'session-item active';
            sessionDiv.textContent = `📄 ${name}`;
            sessionDiv.onclick = () => {
                addMessage('assistant', `Loaded: ${name}`);
            };

            sessionList.appendChild(sessionDiv);
        }

        // Handle Enter Key
        function handleKeydown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendQuestion();
            }
        }

        // Auto-resize textarea
        document.getElementById('questionInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });

        // Initialize
        addMessage('assistant', '👋 Welcome to PDF Chatbot Tester!\n\n🚀 Quick start:\n1. Click "📁 Upload PDF" to select a file\n2. Ask questions about the PDF\n3. Click "🔍 API Status" to check connection\n\nLet\'s test it out!');
    </script>
</body>
</html>
